name: Crawl SHT

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Crawler mode
        required: true
        default: sync_sht_by_tid
        type: choice
        options:
          - sync_sht_by_tid
          - sync_sht_by_max_page
      fids:
        description: Comma-separated forum ids, e.g. 2,36,160
        required: false
        default: ''
        type: string
      start_page:
        description: Start page
        required: true
        default: '1'
        type: string
      max_page:
        description: Max page
        required: true
        default: '5'
        type: string

jobs:
  crawl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: article-master
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PROXY: ${{ secrets.PROXY }}
      FLARE_SOLVERR_URL: ${{ secrets.FLARE_SOLVERR_URL }}
      PYTHONUTF8: '1'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: article-master/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate secrets
        shell: bash
        run: |
          test -n "$DATABASE_URL"
          test -n "$PROXY"
          test -n "$FLARE_SOLVERR_URL"

      - name: Run crawler
        run: >
          python -m app.scripts.run_sht_task
          --mode "${{ inputs.mode }}"
          --fids "${{ inputs.fids }}"
          --start-page "${{ inputs.start_page }}"
          --max-page "${{ inputs.max_page }}"
